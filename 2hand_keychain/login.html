<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your Key2hand account.">
  <title>Login – Key2hand</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .auth-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .auth-logo a {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--primary);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
      text-align: center;
    }

    .auth-subtitle {
      font-size: 0.88rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.9rem;
      font-family: var(--font);
      transition: var(--transition);
    }

    .form-input:focus {
      border-color: var(--primary);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
      outline: none;
    }

    .form-input.error { border-color: var(--red); }

    .form-input::placeholder { color: var(--text-light); }

    .form-error {
      font-size: 0.78rem;
      color: var(--red);
      margin-top: 4px;
      display: none;
    }

    .form-error.visible { display: block; }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .form-check {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.85rem;
      color: var(--text-muted);
      cursor: pointer;
    }

    .form-check input { accent-color: var(--primary); }

    .form-link {
      font-size: 0.85rem;
      color: var(--primary);
      text-decoration: none;
    }

    .form-link:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%;
      padding: 12px;
      font-size: 0.95rem;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-light);
      font-size: 0.8rem;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .alert {
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      margin-bottom: 18px;
      display: none;
    }

    .alert.visible { display: block; }
    .alert-error { background: #FEE2E2; color: var(--red); border: 1px solid #FECACA; }
    .alert-success { background: #DCFCE7; color: var(--green); border: 1px solid #BBF7D0; }

    /* Simple top bar */
    .auth-topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .auth-topbar a { font-size: 0.88rem; color: var(--text-muted); }
    .auth-topbar a:hover { color: var(--primary); }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="auth-topbar">
  <a href="index.html"><img src="assets/images/logo.png" alt="Key2hand" class="nav-logo-img"> <strong style="color:var(--primary)">Key2hand</strong></a>
  <a href="index.html">← Back to Home</a>
</div>

<div class="auth-page">
  <div class="auth-card anim-fade-up">

    <div class="auth-logo">
      <a href="index.html"><img src="assets/images/logo.png" alt="Key2hand" class="nav-logo-img"> Key2hand</a>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Login to your account to continue</p>

    <!-- Alert -->
    <div class="alert alert-error" id="login-error">
      Incorrect email or password. Please try again.
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        >
        <div class="form-error" id="email-error">Please enter a valid email.</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          placeholder="Your password"
          autocomplete="current-password"
          required
        >
        <div class="form-error" id="password-error">Password is required.</div>
      </div>

      <div class="form-row">
        <label class="form-check">
          <input type="checkbox" id="remember-me"> Remember me
        </label>
        <a href="#" class="form-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-submit" id="login-btn">
        Login
      </button>
    </form>

    <div class="auth-divider">or</div>

    <p id="demo-hint" style="font-size:0.82rem;color:var(--text-muted);text-align:center;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px">
      💡 <strong>Demo:</strong> Use email <code>demo@key2hand.com</code> and password <code>demo123</code>
    </p>

    <div class="auth-footer">
      Don't have an account? <a href="register.html" class="form-link">Create one</a>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
  // Redirect if already logged in
  if (isLoggedIn()) window.location.href = 'index.html';

  // Mock user database — demo account from CONFIG
  const MOCK_USERS = [
    { email: CONFIG.auth.demoEmail, password: CONFIG.auth.demoPassword, name: CONFIG.auth.demoName }
  ];

  // Update demo hint in UI from CONFIG
  const hint = document.getElementById('demo-hint');
  if (hint) {
    hint.innerHTML = `💡 <strong>Demo:</strong> Use email <code>${CONFIG.auth.demoEmail}</code> and password <code>${CONFIG.auth.demoPassword}</code>`;
  }

  const form          = document.getElementById('login-form');
  const emailInput    = document.getElementById('email');
  const passwordInput = document.getElementById('password');

  function clearErrors() {
    document.getElementById('email-error').classList.remove('visible');
    document.getElementById('password-error').classList.remove('visible');
    document.getElementById('login-error').classList.remove('visible');
    emailInput.classList.remove('error');
    passwordInput.classList.remove('error');
  }

  function validateEmail(val) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    clearErrors();

    const email    = emailInput.value.trim();
    const password = passwordInput.value;
    let valid = true;

    if (!validateEmail(email)) {
      document.getElementById('email-error').classList.add('visible');
      emailInput.classList.add('error');
      valid = false;
    }

    if (!password) {
      document.getElementById('password-error').classList.add('visible');
      passwordInput.classList.add('error');
      valid = false;
    }

    if (!valid) return;

    // Check against built-in demo + localStorage registered users
    const registered = JSON.parse(localStorage.getItem('key2hand_registered') || '[]');
    const allUsers   = [...MOCK_USERS, ...registered];
    const user       = allUsers.find(u => u.email === email && u.password === password);

    if (!user) {
      document.getElementById('login-error').classList.add('visible');
      return;
    }

    // Save session and redirect
    saveUser({ name: user.name, email: user.email });
    showToast(`👋 Welcome back, ${user.name}!`, 'success');
    setTimeout(() => { window.location.href = 'index.html'; }, 800);
  });
</script>
</body>
</html>
